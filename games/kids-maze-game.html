<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌅 ポケモン迷路ゲーム！</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(180deg,#ffe0b2 0%,#fff9c4 60%,#c8e6c9 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Segoe UI',sans-serif; overflow:hidden;
  }
  h1 { color:#e65100; font-size:1.3em; margin-bottom:6px;
    text-shadow:1px 1px 0 #fff,2px 2px 4px #f9a82566; letter-spacing:2px; }

  /* ===== MAIN LAYOUT ===== */
  #layout { display:flex; flex-direction:row; align-items:flex-start; gap:16px; }

  /* LEFT: game column */
  #leftCol { display:flex; flex-direction:column; align-items:center; }
  #ui {
    display:flex; justify-content:space-between; align-items:center;
    width:100%; padding:4px 2px; font-size:0.86em; gap:6px; margin-bottom:4px;
  }
  #score { color:#e65100; font-weight:bold; font-size:1.05em; }
  #itemCount { color:#388e3c; font-weight:bold; }
  #timer { color:#1565c0; font-weight:bold; }
  #gameWrapper {
    position:relative; border:4px solid #ff8f00; border-radius:12px;
    box-shadow:0 4px 24px #ff8f0044,0 8px 32px #43a04722; overflow:hidden; background:#fffde7;
    flex-shrink:0;
  }
  canvas { display:block; image-rendering:pixelated; }

  /* RIGHT: sidebar */
  #rightCol {
    display:flex; flex-direction:column; align-items:center;
    gap:14px; width:160px; padding-top:36px;
  }
  .side-section {
    width:100%; background:#fff8e155; border-radius:14px;
    border:1px solid #ffcc0244; padding:10px 8px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .side-label {
    color:#e65100; font-size:0.68em; font-weight:bold; letter-spacing:1px;
    text-transform:uppercase; width:100%; text-align:center;
    border-bottom:1px solid #ffcc0266; padding-bottom:4px;
  }
  #uploadPanel { display:flex; flex-direction:column; gap:8px; width:100%; }
  .upload-card {
    background:#fff8e1; border:2px solid #ffcc0233; border-radius:10px;
    padding:7px 8px; display:flex; flex-direction:column; align-items:center;
    gap:3px; transition:border-color .3s,box-shadow .3s; box-shadow:0 1px 4px #0001;
  }
  .upload-card.active { border-color:#ff8f00; box-shadow:0 0 10px #ffb30055; }
  .preview {
    width:46px; height:46px; background:#fffde7; border-radius:8px;
    border:1px dashed #ffb300; display:flex; align-items:center;
    justify-content:center; font-size:24px; overflow:hidden;
  }
  .preview img { width:100%; height:100%; object-fit:contain; }
  .card-label { color:#5d4037; font-size:0.68em; text-align:center; line-height:1.3; }
  .card-label strong { color:#e65100; display:block; font-size:1.05em; margin-bottom:1px; }
  .upload-btn {
    background:linear-gradient(135deg,#ff8f00,#ff6d00); color:white; border:none;
    padding:4px 0; border-radius:12px; cursor:pointer; font-size:0.7em; font-weight:bold;
    transition:transform .1s; width:100%; box-shadow:0 2px 4px #ff6d0033;
  }
  .upload-btn:hover { transform:scale(1.03); }
  .reset-btn {
    background:#efebe9; color:#795548; border:none; padding:2px 0;
    border-radius:8px; cursor:pointer; font-size:0.63em; width:100%; transition:background .2s;
  }
  .reset-btn:hover { background:#d7ccc8; }
  input[type=file] { display:none; }

  /* ===== OVERLAYS ===== */
  .screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .35s;
  }
  .screen.show { opacity:1; pointer-events:all; }

  /* Start screen */
  #startScreen {
    background:linear-gradient(160deg,#0a1a3a 0%,#1a3a6a 60%,#2a5a3a 100%);
  }
  #startScreen .star-bg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  #startScreen .content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:14px; }
  #startTitle {
    font-size:2em; font-weight:bold; color:#fff;
    text-shadow:0 0 20px #ff8f00,2px 2px 0 #000;
    letter-spacing:3px; text-align:center; line-height:1.3;
  }
  #startSubtitle { color:#ffe082; font-size:0.9em; text-shadow:1px 1px 0 #000; }
  .start-btn {
    background:linear-gradient(135deg,#ff8f00,#ff6d00);
    color:#fff; border:none; padding:14px 40px; border-radius:30px;
    font-size:1.1em; font-weight:bold; cursor:pointer;
    box-shadow:0 4px 18px #ff6d0066; transition:transform .15s,box-shadow .15s;
    letter-spacing:2px;
  }
  .start-btn:hover { transform:scale(1.07); box-shadow:0 6px 24px #ff6d0099; }
  #bestScore { color:#ffd54f; font-size:0.82em; }

  /* Result overlay (clear / gameover) */
  #resultScreen { background:#0008; }
  #resultTitle {
    font-size:2.2em; font-weight:bold; color:#fff;
    text-shadow:2px 2px 0 #000,0 0 24px #ff8f00; margin-bottom:8px;
  }
  #resultMsg { color:#ffe082; font-size:1em; text-shadow:1px 1px 0 #000; margin-bottom:16px; text-align:center; line-height:1.6; }
  #levelBar {
    display:flex; gap:5px; flex-wrap:wrap; justify-content:center;
    max-width:300px; margin-bottom:14px;
  }
  .level-dot {
    width:18px; height:18px; border-radius:50%;
    background:#555; border:2px solid #888; transition:background .3s;
  }
  .level-dot.done { background:#ff8f00; border-color:#ffd54f; }
  .level-dot.current { background:#fff; border-color:#ff8f00; box-shadow:0 0 8px #ff8f00; }

  .back-btn {
    background: #fff3e0; color: #e65100; border: 2px solid #ff8f00;
    padding: 8px 22px; border-radius: 20px; font-size: 0.85em; font-weight: bold;
    cursor: pointer; transition: transform .15s, background .15s;
    margin-top: 6px; letter-spacing: 1px;
  }
  .back-btn:hover { transform: scale(1.05); background: #ffe0b2; }

  /* Stage clear banner */
  #stageBanner {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.5);
    background:linear-gradient(135deg,#ff8f00,#ff6d00);
    color:#fff; font-size:1.8em; font-weight:bold;
    padding:16px 36px; border-radius:16px;
    box-shadow:0 4px 24px #ff6d0088;
    pointer-events:none; opacity:0; transition:opacity .2s,transform .2s;
    text-shadow:1px 1px 0 #000; white-space:nowrap;
    z-index:10;
  }
  #stageBanner.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
  /* D-pad */
  #dpad {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; user-select: none;
  }
  .dpad-row { display: flex; align-items: center; gap: 4px; }
  .dpad-btn {
    width: 52px; height: 52px;
    background: linear-gradient(160deg, #fff8e1, #ffe0b2);
    border: 3px solid #ff8f00; border-radius: 14px;
    font-size: 1.4em; color: #e65100; cursor: pointer;
    box-shadow: 0 4px 0 #e65100, 0 6px 10px #0002;
    transition: transform .08s, box-shadow .08s;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #e65100, 0 2px 5px #0002;
    background: linear-gradient(160deg, #ffe0b2, #ffcc80);
  }
  .dpad-center {
    width: 52px; height: 52px;
    background: linear-gradient(160deg, #fff8e1, #ffe0b2);
    border: 3px solid #ff8f00; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1em; color: #ffb300;
    box-shadow: 0 4px 0 #e65100, 0 6px 10px #0002;
  }
</style>
</head>
<body>

<h1>🌅 ポケモン迷路ゲーム！</h1>
<div id="ui">
  <div id="score">⭐ スコア: <span id="scoreVal">0</span></div>
  
  <div id="timer">⏱ <span id="timerVal">0</span>秒</div>
  <button class="back-btn" style="padding:3px 10px;font-size:0.72em;margin-top:0;" onclick="showTitle()">🏠 トップ</button>
</div>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="480" height="480"></canvas>
  <div id="stageBanner"></div>

  <!-- START SCREEN -->
  <div id="startScreen" class="screen show">
    <canvas id="starCanvas" class="star-bg" width="480" height="480"></canvas>
    <div class="content">
      <div id="startTitle">🌅 ポケモン<br>迷路ゲーム！</div>
      <div id="startSubtitle">アイテムをぜんぶあつめてゴールへ！</div>
      <div id="levelBar"></div>
      <button class="start-btn" id="startBtn">▶ スタート</button>
      <div id="bestScore">🏆 ベストスコア: <span id="bestVal">---</span></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="screen">
    <div id="resultTitle"></div>
    <div id="resultMsg"></div>
    <div id="levelBar2"></div>
    <button class="start-btn" id="resultBtn"></button>
    <button class="back-btn" id="resultBackBtn" onclick="showTitle()">🏠 トップにもどる</button>
  </div>
</div>
<div id="dpad">
  <div class="dpad-row">
    <button class="dpad-btn" id="btn-up" ontouchstart="dpadPress('ArrowUp');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowUp')" onmouseup="dpadRelease()">▲</button>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btn-left" ontouchstart="dpadPress('ArrowLeft');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowLeft')" onmouseup="dpadRelease()">◀</button>
    <div class="dpad-center">✦</div>
    <button class="dpad-btn" id="btn-right" ontouchstart="dpadPress('ArrowRight');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowRight')" onmouseup="dpadRelease()">▶</button>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btn-down" ontouchstart="dpadPress('ArrowDown');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowDown')" onmouseup="dpadRelease()">▼</button>
  </div>
</div>

<div id="uploadPanel">
  <div class="upload-card" id="card-player">
    <div class="preview" id="prev-player">🧒</div>
    <div class="card-label"><strong>🎮 プレイヤー</strong>主人公の絵</div>
    <button class="upload-btn" onclick="document.getElementById('file-player').click()">🖼️ えらぶ</button>
    <button class="reset-btn" onclick="resetToDefault('player')">もとにもどす</button>
    <input type="file" id="file-player" accept="image/*" onchange="loadImg(event,'player')">
  </div>
        <div class="upload-card" id="card-item">
          <div class="preview" id="prev-item">⭐</div>
          <div class="card-label"><strong>⭐ アイテム</strong></div>
          <button class="upload-btn" onclick="document.getElementById('file-item').click()">🖼️ えらぶ</button>
          <button class="reset-btn" onclick="resetToDefault('item')">もとにもどす</button>
          <input type="file" id="file-item" accept="image/*" onchange="loadImg(event,'item')">
        </div>
      </div><!-- /uploadPanel -->
    </div><!-- /side-section characters -->

    <!-- 十字キー -->
    <div class="side-section">
      <div class="side-label">🕹️ 十字キー</div>
      <div id="dpad">
        <div class="dpad-row">
          <button class="dpad-btn" id="btn-up" ontouchstart="dpadPress('ArrowUp');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowUp')" onmouseup="dpadRelease()">▲</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" id="btn-left" ontouchstart="dpadPress('ArrowLeft');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowLeft')" onmouseup="dpadRelease()">◀</button>
          <div class="dpad-center">✦</div>
          <button class="dpad-btn" id="btn-right" ontouchstart="dpadPress('ArrowRight');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowRight')" onmouseup="dpadRelease()">▶</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" id="btn-down" ontouchstart="dpadPress('ArrowDown');return false;" ontouchend="dpadRelease()" onmousedown="dpadPress('ArrowDown')" onmouseup="dpadRelease()">▼</button>
        </div>
      </div>
    </div><!-- /side-section dpad -->

  </div><!-- /rightCol -->

</div><!-- /layout -->

const customImgs = { player: null, item: null };
let bestScore = 0;
const MAX_LEVEL = 20;

// ---- background removal ----
function removeBlackBg(img) {
  const oc = document.createElement('canvas');
  oc.width=img.width; oc.height=img.height;
  const octx=oc.getContext('2d');
  octx.drawImage(img,0,0);
  const id=octx.getImageData(0,0,oc.width,oc.height);
  const d=id.data;
  const corner=(x,y)=>{ const i=(y*oc.width+x)*4; return [d[i],d[i+1],d[i+2]]; };
  const corners=[corner(0,0),corner(oc.width-1,0),corner(0,oc.height-1),corner(oc.width-1,oc.height-1)];
  const bg=corners.reduce((a,b)=>(a[0]+a[1]+a[2])<(b[0]+b[1]+b[2])?a:b);
  const thr=60;
  for(let i=0;i<d.length;i+=4){
    const dist=Math.sqrt((d[i]-bg[0])**2+(d[i+1]-bg[1])**2+(d[i+2]-bg[2])**2);
    if(dist<thr) d[i+3]=Math.floor(d[i+3]*(dist/thr));
  }
  octx.putImageData(id,0,0);
  return oc.toDataURL();
}

function applyImg(src, type) {
  const img=new Image();
  img.onload=()=>{
    const cleaned=removeBlackBg(img);
    const result=new Image();
    result.onload=()=>{
      customImgs[type]=result;
      const prev=document.getElementById('prev-'+type);
      prev.innerHTML='';
      const th=document.createElement('img');
      th.src=cleaned; prev.appendChild(th);
      document.getElementById('card-'+type).classList.add('active');
    };
    result.src=cleaned;
  };
  img.src=src;
}

function loadImg(e, type) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>applyImg(ev.target.result, type);
  reader.readAsDataURL(file);
}

function resetToDefault(type) {
  applyImg(type==='player'?DEFAULT_PLAYER_SRC:DEFAULT_ITEM_SRC, type);
}

function drawImgAspect(img,cx,cy,maxW,maxH) {
  const r=img.width/img.height;
  const dw=r>=1?maxW:maxH*r, dh=r>=1?maxW/r:maxH;
  ctx.drawImage(img,cx-dw/2,cy-dh/2,dw,dh);
}

// Load defaults on boot
applyImg(DEFAULT_PLAYER_SRC,'player');
applyImg(DEFAULT_ITEM_SRC,'item');

const canvas=document.getElementById('gameCanvas');

const W=canvas.width, H=canvas.height; // 480x480

// ===== STAR ANIMATION (start screen) =====
const starCanvas=document.getElementById('starCanvas');
const sctx=starCanvas.getContext('2d');
starCanvas.width=480; starCanvas.height=480;
const stars=Array.from({length:80},()=>{
  return {x:Math.random()*480,y:Math.random()*480,r:Math.random()*1.8+0.4,
    sp:Math.random()*0.4+0.1,t:Math.random()*Math.PI*2};
});
function animStars() {
  sctx.clearRect(0,0,560,560);
  stars.forEach(s=>{
    s.t+=0.04; s.y+=s.sp; if(s.y>480){s.y=0;s.x=Math.random()*480;}
    sctx.globalAlpha=0.5+0.5*Math.sin(s.t);
    sctx.fillStyle='#fff';
    sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2); sctx.fill();
  });
  sctx.globalAlpha=1;
  if(gameState==='title') requestAnimationFrame(animStars);
}

// ===== MAZE =====
const COLS=14, ROWS=14;
const CW=Math.floor(W/COLS), CH=Math.floor(H/ROWS);

function generateMaze(cols,rows) {
  const grid=Array.from({length:rows},()=>new Array(cols).fill(0b1111));
  const vis=Array.from({length:rows},()=>new Array(cols).fill(false));
  function carve(x,y) {
    vis[y][x]=true;
    const dirs=[[0,-1,1,4],[1,0,2,8],[0,1,4,1],[-1,0,8,2]];
    for(let i=dirs.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [dirs[i],dirs[j]]=[dirs[j],dirs[i]]; }
    for(const [dx,dy,wall,nwall] of dirs) {
      const nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!vis[ny][nx]) {
        grid[y][x]&=~wall; grid[ny][nx]&=~nwall; carve(nx,ny);
      }
    }
  }
  carve(0,0); return grid;
}

// ===== LEVEL BAR =====
function buildLevelBar(containerId, current) {
  const bar=document.getElementById(containerId);
  if(!bar) return;
  bar.innerHTML='';
  for(let i=1;i<=MAX_LEVEL;i++) {
    const d=document.createElement('div');
    d.className='level-dot';
    if(i<current) d.classList.add('done');
    if(i===current) d.classList.add('current');
    bar.appendChild(d);
  }
}

// ===== GAME STATE =====
let maze,items,visitedCells,player,score,elapsedTime,stage,animT,gameState;
let particles=[],popups=[];
let timerInterval=null;
gameState='title';

function initGame(stageNum) {
  stage=stageNum;
  maze=generateMaze(COLS,ROWS);
  animT=0;
  visitedCells=new Set(['0,0']); // スタートマスは最初から訪問済み

  player={
    gx:0,gy:0, px:CW/2,py:CH/2, tx:CW/2,ty:CH/2,
    moving:false, frame:0,frameTimer:0, facing:1, bobAnim:0, stepAnim:0,
  };

  items=[];
  score=0; elapsedTime=0; particles=[]; popups=[];
  gameState='playing';

  document.getElementById('scoreVal').textContent=0;


  document.getElementById('timerVal').textContent=0;
  document.getElementById('startScreen').classList.remove('show');
  document.getElementById('resultScreen').classList.remove('show');

  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(gameState==='playing') {
      elapsedTime++;
      document.getElementById('timerVal').textContent=elapsedTime;
    }
  },1000);
}

function showResult(type) {
  gameState=type; // 'clear' or 'gameover'
  if(timerInterval) clearInterval(timerInterval);

  const isFinished = (type==='clear' && stage>=MAX_LEVEL);

  if(type==='clear') {
    const bonus=Math.max(0,200-elapsedTime*2);
    const total=score+bonus;
    if(total>bestScore) { bestScore=total; document.getElementById('bestVal').textContent=total; }
    document.getElementById('resultTitle').textContent= isFinished ? '🏆 ぜんぶクリア！！' : '🎉 ステージクリア！';
    document.getElementById('resultMsg').innerHTML=
      `スコア: <b>${total}</b>　タイムボーナス: +${bonus}<br>` +
      (isFinished ? 'すごい！全20ステージせいは！' : `つぎは ステージ ${stage+1} / ${MAX_LEVEL}`);
    document.getElementById('resultBtn').textContent= isFinished ? '🌟 はじめからあそぶ' : '▶ つぎのステージ';
    document.getElementById('resultBtn').onclick= isFinished
      ? ()=>showTitle()
      : ()=>initGame(stage+1);
  } else {
    document.getElementById('resultTitle').textContent='💀 ゲームオーバー';
    document.getElementById('resultMsg').innerHTML=`ステージ ${stage} まで たどりついた！`;
    document.getElementById('resultBtn').textContent='🔄 もういちど';
    document.getElementById('resultBtn').onclick=()=>initGame(stage);
  }
  buildLevelBar('levelBar2', stage);
  document.getElementById('resultScreen').classList.add('show');
}

function showTitle() {
  gameState='title';
  if(timerInterval) clearInterval(timerInterval);
  buildLevelBar('levelBar',1);
  document.getElementById('startScreen').classList.add('show');
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('bestVal').textContent = bestScore>0 ? bestScore : '---';
  requestAnimationFrame(animStars);
}

// ===== INPUT =====
const keys={};
document.addEventListener('keydown',e=>{
  if(!keys[e.code]) { keys[e.code]=true; handleMove(e.code); }
  if(e.code==='Enter') {
    if(gameState==='title') startGame();
    else if(gameState==='clear') {
      if(stage>=MAX_LEVEL) showTitle(); else initGame(stage+1);
    }
    else if(gameState==='gameover') initGame(stage);
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

document.getElementById('startBtn').addEventListener('click', startGame);
function startGame() {
  buildLevelBar('levelBar2',1);
  initGame(1);
}

let touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)) handleMove(dx>0?'ArrowRight':'ArrowLeft');
  else handleMove(dy>0?'ArrowDown':'ArrowUp');
},{passive:true});

function handleMove(code) {
  if(gameState!=='playing'||player.moving) return;
  const map={ArrowUp:'ArrowUp',KeyW:'ArrowUp',ArrowDown:'ArrowDown',KeyS:'ArrowDown',
              ArrowLeft:'ArrowLeft',KeyA:'ArrowLeft',ArrowRight:'ArrowRight',KeyD:'ArrowRight'};
  const dir=map[code]; if(!dir) return;
  const {gx,gy}=player;
  const cell=maze[gy][gx];
  let nx=gx,ny=gy,blocked=false;
  if(dir==='ArrowUp')    {if(cell&1) blocked=true; else ny--;}
  if(dir==='ArrowRight') {if(cell&2) blocked=true; else nx++;}
  if(dir==='ArrowDown')  {if(cell&4) blocked=true; else ny++;}
  if(dir==='ArrowLeft')  {if(cell&8) blocked=true; else nx--;}
  if(dir==='ArrowRight') player.facing=1;
  if(dir==='ArrowLeft')  player.facing=-1;
  if(!blocked&&nx>=0&&nx<COLS&&ny>=0&&ny<ROWS) {
    player.gx=nx; player.gy=ny;
    player.tx=nx*CW+CW/2; player.ty=ny*CH+CH/2;
    player.moving=true; player.stepAnim=10;
    // 訪問済みに追加
    visitedCells.add(`${nx},${ny}`);
    // スコア加算（新しいマスなら）
    spawnP(nx*CW+CW/2,ny*CH+CH/2,'#ff8f0066',4);
    // ゴール判定（右下のマス）
    if(nx===COLS-1&&ny===ROWS-1) {
      const bonus=Math.max(0,300-elapsedTime*3);
      score+=bonus;
      document.getElementById('scoreVal').textContent=score;
      spawnP(nx*CW+CW/2,ny*CH+CH/2,'#e53935',16);
      spawnP(nx*CW+CW/2,ny*CH+CH/2,'#fff',12);
      setTimeout(()=>showResult('clear'),400);
    }
  } else {
    spawnP(gx*CW+CW/2,gy*CH+CH/2,'#ef9a9a',4);
  }
}

function spawnP(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i;
    particles.push({x,y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,life:25,color:col});
  }
}
function popup(x,y,t){popups.push({x,y,text:t,life:50});}

// ===== UPDATE =====
function update() {
  if(gameState!=='playing') return;
  animT++;
  const p=player;
  if(p.moving) {
    const dx=p.tx-p.px, dy=p.ty-p.py;
    if(Math.abs(dx)<4&&Math.abs(dy)<4) {p.px=p.tx;p.py=p.ty;p.moving=false;}
    else {p.px+=dx*0.28;p.py+=dy*0.28;}
  }
  p.bobAnim+=0.1; if(p.stepAnim>0) p.stepAnim--;
  p.frameTimer++; if(p.frameTimer>6){p.frame=(p.frame+1)%4;p.frameTimer=0;}
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  popups.forEach(pp=>{pp.y-=1;pp.life--;});
  popups=popups.filter(pp=>pp.life>0);
}

// ===== DRAW BG =====
function drawBackground() {
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ff6b35'); g.addColorStop(0.35,'#f7931e');
  g.addColorStop(0.65,'#ffc85a'); g.addColorStop(1,'#ff8c69');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ===== DRAW MAZE =====
function drawMaze() {
  for(let row=0;row<ROWS;row++) for(let col=0;col<COLS;col++) {
    const x=col*CW,y=row*CH;
    const visited=visitedCells.has(`${col},${row}`);
    if(visited) {
      // 通ったマスは黄色く
      ctx.fillStyle='#ffe066cc';
    } else {
      ctx.fillStyle=(col+row)%2===0?'#ffffff33':'#ffffff1a';
    }
    ctx.fillRect(x+2,y+2,CW-2,CH-2);
  }
  ctx.lineCap='square';
  for(let row=0;row<ROWS;row++) for(let col=0;col<COLS;col++) {
    const x=col*CW,y=row*CH,cell=maze[row][col];
    ctx.lineWidth=3; ctx.strokeStyle='#7b3f00';
    if(cell&1){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+CW,y);ctx.stroke();}
    if(cell&2){ctx.beginPath();ctx.moveTo(x+CW,y);ctx.lineTo(x+CW,y+CH);ctx.stroke();}
    if(cell&4){ctx.beginPath();ctx.moveTo(x,y+CH);ctx.lineTo(x+CW,y+CH);ctx.stroke();}
    if(cell&8){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+CH);ctx.stroke();}
  }
  // Start
  ctx.fillStyle='#a5d6a766'; ctx.fillRect(2,2,CW-4,CH-4);
  ctx.fillStyle='#2e7d32'; ctx.font=`bold ${Math.floor(CW*0.2)}px sans-serif`; ctx.textAlign='center';
  ctx.fillText('スタート',CW/2,CH/2+4);
  // Goal: ポケモンボール
  const gx=(COLS-1)*CW, gy=(ROWS-1)*CH;
  const cx=gx+CW/2, cy=gy+CH/2;
  const r=Math.min(CW,CH)*0.32;
  ctx.save(); ctx.translate(cx,cy);
  // 光彩
  ctx.shadowColor='#e53935'; ctx.shadowBlur=12+Math.sin(animT*0.07)*5;
  // 上半分（赤）
  ctx.fillStyle='#e53935';
  ctx.beginPath(); ctx.arc(0,0,r,Math.PI,0); ctx.fill();
  // 下半分（白）
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI); ctx.fill();
  // 中央ライン
  ctx.shadowBlur=0;
  ctx.fillStyle='#212121'; ctx.fillRect(-r,-2,r*2,4);
  // 中央ボタン
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(0,0,r*0.32,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#212121';
  ctx.beginPath(); ctx.arc(0,0,r*0.18,0,Math.PI*2); ctx.fill();
  // 外枠
  ctx.strokeStyle='#212121'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ===== DRAW ITEMS (なし) =====
function drawItems() {}

// ===== DRAW PLAYER =====
function drawPlayerChar() {
  const p=player;
  const bob=Math.sin(p.bobAnim)*(p.moving?2.5:1);
  ctx.save(); ctx.translate(p.px,p.py+bob);
  if(p.facing<0) ctx.scale(-1,1);
  const size=Math.min(CW,CH)*0.78;
  if(customImgs.player) {
    drawImgAspect(customImgs.player,0,0,size,size);
  } else {
    const s=size/44; ctx.scale(s,s);
    ctx.fillStyle='#1565c0'; ctx.fillRect(-9,8,8,11); ctx.fillRect(1,8,8,11);
    ctx.fillStyle='#e53935';
    ctx.beginPath(); ctx.moveTo(-12,-13); ctx.lineTo(12,-13); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff8'; ctx.fillRect(-12,-4,24,4);
    ctx.fillStyle='#ffcc80'; ctx.beginPath(); ctx.ellipse(0,-22,12,11,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a237e';
    ctx.beginPath(); ctx.ellipse(-4,-22,2.2,2.8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(4,-22,2.2,2.8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e53935';
    ctx.beginPath(); ctx.moveTo(-12,-32); ctx.lineTo(12,-32); ctx.lineTo(10,-38); ctx.lineTo(-10,-38); ctx.closePath(); ctx.fill();
    ctx.fillRect(-13,-34,26,3);
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,-34,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#212121'; ctx.beginPath(); ctx.arc(0,-34,1.8,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
  ctx.save();
  ctx.fillStyle='#00000022';
  ctx.beginPath(); ctx.ellipse(p.px,p.py+Math.min(CW,CH)*0.38,Math.min(CW,CH)*0.26,Math.min(CW,CH)*0.07,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ===== DRAW FX =====
function drawFx() {
  particles.forEach(pt=>{
    ctx.globalAlpha=pt.life/25; ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,3.5,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  popups.forEach(pp=>{
    ctx.globalAlpha=pp.life/50; ctx.fillStyle='#e65100';
    ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
    ctx.fillText(pp.text,pp.x,pp.y);
  });
  ctx.globalAlpha=1;
}

// ===== HUD (stage indicator) =====
function drawHUD() {
  if(gameState!=='playing') return;
  // stage dots at top
  const dotR=4, gap=10, total=MAX_LEVEL;
  const startX=W/2 - (total*(dotR*2+gap)-gap)/2 + dotR;
  for(let i=0;i<total;i++) {
    ctx.beginPath();
    ctx.arc(startX+i*(dotR*2+gap), 10, dotR, 0, Math.PI*2);
    ctx.fillStyle = i+1<stage ? '#ff8f00' : i+1===stage ? '#fff' : '#00000033';
    ctx.fill();
    if(i+1===stage) {
      ctx.strokeStyle='#ff8f00'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(startX+i*(dotR*2+gap),10,dotR+1.5,0,Math.PI*2); ctx.stroke();
    }
  }
  ctx.fillStyle='#e6510099'; ctx.font='bold 11px sans-serif'; ctx.textAlign='right';
  ctx.fillText(`LEVEL ${stage} / ${MAX_LEVEL}`,W-6,14);
}

// ===== MAIN LOOP =====
function loop() {
  update();
  if(gameState==='playing'||gameState==='clear'||gameState==='gameover') {
    ctx.clearRect(0,0,W,H);
    drawBackground(); drawMaze(); drawItems(); drawPlayerChar(); drawFx(); drawHUD();
  }
  requestAnimationFrame(loop);
}

// ===== D-PAD =====
function dpadPress(code) {
  handleMove(code);
  document.getElementById('btn-' + code.replace('Arrow','').toLowerCase())?.classList.add('pressed');
}
function dpadRelease() {
  ['up','down','left','right'].forEach(d =>
    document.getElementById('btn-'+d)?.classList.remove('pressed')
  );
}
// touchcancelでも確実に解除
document.addEventListener('touchcancel', dpadRelease);
document.addEventListener('touchend', dpadRelease);

// ===== BOOT =====
showTitle();
loop();
</script>
